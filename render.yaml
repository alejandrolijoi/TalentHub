services:
  - type: web
    name: talenthub-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: DATABASE_URL
        fromDatabase:
          name: talenthub-db
          property: connectionString
      - key: Jwt__SecretKey
        generateValue: true
      - key: Jwt__Issuer
        value: talenthub.com
      - key: Jwt__Audience
        value: talenthub.com
      - key: Jwt__ExpirationMinutes
        value: "15"
      - key: Jwt__RefreshExpirationDays
        value: "7"
      - key: Frontend__Url
        value: "https://talent-hub-wine.vercel.app,http://localhost:3000"
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: talenthub-frontend
    runtime: node
    rootDir: frontend
    buildCommand: yarn install && yarn build
    startCommand: yarn start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://talenthub-api.onrender.com/api
    autoDeploy: true

databases:
  - name: talenthub-db
    plan: free
    databaseName: talenthub
    ipAllowList: []
