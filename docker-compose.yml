version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: talenthub-postgres
    environment:
      POSTGRES_DB: talenthub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: talenthub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: talenthub-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultHost=Host=postgres;Port=5432;Database=talenthub;Username=postgres;Password=postgres
      - Redis__Configuration=redis:6379
      - Jwt__SecretKey=TalentHub_SuperSecretKey_2026_MustBeAtLeast32Characters!
      - Jwt__Issuer=talenthub.com
      - Jwt__Audience=talenthub.com
      - Jwt__ExpirationMinutes=15
      - Frontend__Url=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
