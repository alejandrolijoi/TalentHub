name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: talenthub_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore backend/TalentHub.sln

    - name: Build
      run: dotnet build backend/TalentHub.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test backend/TalentHub.sln --no-build --configuration Release --verbosity normal
      env:
        ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=talenthub_test;Username=postgres;Password=postgres

    - name: Publish
      if: github.ref == 'refs/heads/main'
      run: dotnet publish backend/src/TalentHub.Api/TalentHub.Api.csproj -c Release -o ${{ github.workspace }}/publish
